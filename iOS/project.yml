name: SnoreNotes
options:
  bundleIdPrefix: com.shimondeitel.snorenotes
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SnoreNotes:
    type: application
    platform: iOS
    sources:
      - path: SnoreNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snorenotes
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SnoreNotes/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SnoreNotesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SnoreNotesTests
      - path: SnoreNotes.storekit
    dependencies:
      - target: SnoreNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snorenotes.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SnoreNotesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SnoreNotesUITests
    dependencies:
      - target: SnoreNotes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.snorenotes.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SnoreNotes:
    build:
      targets:
        SnoreNotes: all
        SnoreNotesTests: [test]
        SnoreNotesUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SnoreNotes.storekit
    test:
      config: Debug
      storeKitConfiguration: SnoreNotes.storekit
      targets:
        - SnoreNotesTests
        - SnoreNotesUITests
    archive:
      config: Release
